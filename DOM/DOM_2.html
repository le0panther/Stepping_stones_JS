<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Implimentation</title>
</head>
<body>

    
    
</body>
<script>
    const temp=document.querySelector("body")
    temp.style.backgroundColor="black"
    temp.style.color="white"

    const div=document.createElement("div")

    function Adder(lang) {
        const vari=document.createElement("li")
        let content=document.createTextNode(`${lang}`)
        vari.appendChild(content)
        div.appendChild(vari)  
    
    }

    
    Adder("Javascript")
    Adder(9)
    Adder("NODE")
    console.log(div) 

    div.children[1].remove()
    temp.appendChild(div)


</script>
</html>
